<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Usage</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="widget">
    <div class="titlebar">
      <div class="titlebar-left">
        <span class="titlebar-icon">☁</span>
        <span class="titlebar-text">AI Usage</span>
      </div>
      <div class="titlebar-controls">
        <button class="btn-min" id="btn-min" title="Minimize">─</button>
        <button class="btn-close" id="btn-close" title="Close">✕</button>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="usage">Usage</button>
      <button class="tab" data-tab="keys">API Keys</button>
      <button class="tab" data-tab="settings">Settings</button>
    </div>

    <div class="tab-content" id="tab-usage">
      <div class="content" id="content">
        <div class="loading" id="loading">
          <div class="spinner"></div>
          <span>Fetching usage data...</span>
        </div>
      </div>
    </div>

    <div class="tab-content hidden" id="tab-keys">
      <div class="keys-content">
        <div class="keys-list" id="keys-list"></div>

        <div class="key-add">
          <div class="key-add-title">Add new key</div>
          <input id="key-name" class="key-input" placeholder="Name (e.g. OpenAI)" autocomplete="off">
          <input id="key-value" class="key-input" type="password" placeholder="API key" autocomplete="off">
          <button id="key-add-btn" class="key-add-btn">+ Add</button>
          <div class="key-status" id="key-status"></div>
        </div>
      </div>
    </div>

    <div class="tab-content hidden" id="tab-settings">
      <div class="settings-content">
        <label class="setting-row" for="setting-autolaunch">
          <input type="checkbox" id="setting-autolaunch" class="setting-checkbox">
          <span class="setting-text">
            <span class="setting-label">Start at login</span>
            <span class="setting-desc">Launch the widget automatically when you sign in to Windows.</span>
          </span>
        </label>
        <div class="setting-status" id="setting-status"></div>
      </div>
    </div>

    <div class="footer">
      <span id="footer-updated">—</span>
      <div class="footer-refresh">
        <span id="footer-next">—</span>
        <button class="refresh-btn" id="btn-refresh" title="Refresh now">↻</button>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
